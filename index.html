<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Pasandida Ladki 💗🧿</title>
<style>
body{margin:0;background:linear-gradient(180deg,#ffd7e8,#fff5fa);font-family:Arial,sans-serif;overflow:hidden}
.hearts span{position:fixed;bottom:-40px;font-size:22px;animation:rise linear infinite}
@keyframes rise{to{transform:translateY(-120vh)}}
.screen{display:flex;justify-content:center;align-items:center;height:100vh;padding:20px}
.card{background:#fff8fc;padding:28px;border-radius:20px;max-width:760px;box-shadow:0 10px 30px rgba(0,0,0,.15);text-align:center}
button{padding:12px 24px;border:none;border-radius:30px;background:#ff5f94;color:#fff;font-size:18px;cursor:pointer}
.hide{display:none}
#msg{white-space:pre-wrap;text-align:left;line-height:1.8}
.sorry{font-size:28px;color:#d63384;animation:pulse 1.2s infinite}
@keyframes pulse{50%{transform:scale(1.08)}}
.music{position:fixed;top:12px;right:12px}
</style>
</head>
<body>
<div class="hearts" id="h"></div>
<div class="music"><button onclick="toggleMusic()">🎵 Music On/Off</button></div>
<audio id="bgm" loop>
<source src="Ishq De Fanniyar (Female) - Full Audio Fukrey Returns Jyotica Tangri Shaarib Toshi.mp3" type="audio/mpeg">
</audio>

<div id="s1" class="screen"><div class="card">
<h1>For My Pasandida Ladki 💗🧿</h1>
<p><b>A Little Surprise From Your Anchuu ✨</b></p>
<button onclick="openLetter()">💌 Open My Letter</button>
</div></div>

<div id="s2" class="screen hide"><div class="card">
<div id="msg"></div>
<p class="sorry">I'm Sorry. 💗🫂</p>
<button onclick="next()">👀 Go Ahead</button>
</div></div>

<div id="s3" class="screen hide"><div class="card">
<h2>Do You Love Me? 💗</h2>
<button onclick="end()">Yes 💗</button><br><br>
<button onclick="end()">Very Much 🥹</button>
</div></div>

<div id="s4" class="screen hide"><div class="card">
<h2>I Knew It... 🫣☺️</h2>
<p>I loveee youu tooo meriii Charuu💗🫂🧿💋</p>
<p class="sorry">I'm Sorry. 💗🫂</p>
</div></div>

<script>
const text=`Meri Gudda 💗🥺,
I loveee youuu sooo much... sch m, tu mere liye sabse zyda important hai. 💗 Mujhe kbhi bhi tujhe irritate ya hurt nhi karna hota, but pta nhi yaar, kbhi kbhi merse galti ho jaati hai. 😭
I'm really, really sorry Charuu... 🥺💗 Please gussa mt raha kr mujhse. Mai bs itna chahta hoon ki tu hamesha khush rahe. I promise I'll keep trying to become better for you. I lovee youu more than anything. I loveee merii jaan meri gudda mera bcchu💗🫂🧿💋`;
for(let i=0;i<40;i++){let s=document.createElement('span');s.innerHTML='💗';s.style.left=Math.random()*100+'vw';s.style.animationDuration=(5+Math.random()*5)+'s';h.appendChild(s)}
function openLetter(){s1.classList.add('hide');s2.classList.remove('hide');bgm.play().catch(()=>{});let i=0;let t=msg;let v=setInterval(()=>{t.textContent+=text[i++]||'';if(i>text.length)clearInterval(v)},25)}
function next(){s2.classList.add('hide');s3.classList.remove('hide')}
function end(){s3.classList.add('hide');s4.classList.remove('hide')}
function toggleMusic(){if(bgm.paused)bgm.play();else bgm.pause();}
</script>
</body></html>
